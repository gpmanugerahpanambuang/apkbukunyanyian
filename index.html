<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANUGERAH - Kidung Pujian</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-green-600 mb-2 animate-pulse">
                <i class="fas fa-music mr-3"></i>ANUGERAH - Kidung Pujian
            </h1>
            <p class="text-gray-400">Daftar Buku Nyanyian</p>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto">
            <!-- Search Bar -->
            <div class="mb-8">
                <div class="relative max-w-md mx-auto">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Cari buku lagu atau nomor lagu..." 
                        class="w-full p-4 pl-12 rounded-lg bg-gray-800 text-white border border-gray-700 focus:border-green-500 focus:outline-none transition-all duration-300"
                    >
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <!-- Breadcrumb Navigation -->
            <nav id="breadcrumb" class="mb-6 text-sm">
                <span class="text-gray-400">Beranda</span>
            </nav>

            <!-- Books Container -->
            <div id="booksContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Books will be loaded here -->
            </div>

            <!-- Songs Container -->
            <div id="songsContainer" class="song-list my-6 hidden">
                <!-- Songs will be loaded here -->
            </div>

            <!-- Song Content -->
            <div id="songContent" class="hidden">
                <button id="backButton" class="mb-4 px-4 py-2 bg-green-700 hover:bg-green-600 rounded-lg transition-all duration-300 transform hover:scale-105">
                    <i class="fas fa-arrow-left mr-2"></i>Kembali
                </button>
                <div class="bg-gray-800 rounded-lg p-8 shadow-2xl">
                    <h2 id="songTitle" class="text-3xl font-bold text-green-500 mb-6"></h2>
                    <div id="songLyrics" class="text-lg leading-relaxed text-gray-300"></div>
                </div>
            </div>
        </main>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
            <div class="text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-green-500 mx-auto"></div>
                <p class="mt-4 text-white">Memuat...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="script.js"></script>
</body>
</html>
